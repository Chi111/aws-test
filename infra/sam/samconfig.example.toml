version = 0.1

[default.deploy.parameters]
stack_name = "github-profile-sam-dev"
resolve_s3 = true
region = "us-east-1"
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
fail_on_empty_changeset = false
parameter_overrides = [
  "ProjectName=github-profile-sam-dev",
  "DatabaseUrl=postgresql://USER:PASSWORD@YOUR-AURORA-ENDPOINT:5432/DBNAME",
  "JwtSecret=replace-with-at-least-32-characters",
  "CorsOrigin=http://localhost:3001",
  "VpcId=vpc-xxxxxxxx",
  "PrivateSubnetIds=subnet-aaaaaaa,subnet-bbbbbbb",
  "AuroraSecurityGroupId=sg-xxxxxxxx"
]
