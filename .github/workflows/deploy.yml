name: Deploy MVP

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-2' }}
      STACK_NAME: ${{ vars.STACK_NAME || 'github-profile-sam-dev' }}
      VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm check-types
      - run: pnpm build

      - uses: aws-actions/setup-sam@v2

      - name: SAM build
        run: sam build --template-file infra/sam/template.yaml

      - name: Prepare SAM artifact bucket
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          SAM_ARTIFACT_BUCKET="${{ vars.SAM_ARTIFACT_BUCKET }}"
          if [ -z "$SAM_ARTIFACT_BUCKET" ]; then
            SAM_ARTIFACT_BUCKET="${STACK_NAME}-artifacts-${ACCOUNT_ID}-${AWS_REGION}"
          fi
          echo "SAM_ARTIFACT_BUCKET=$SAM_ARTIFACT_BUCKET" >> "$GITHUB_ENV"

          if ! aws s3api head-bucket --bucket "$SAM_ARTIFACT_BUCKET" 2>/dev/null; then
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$SAM_ARTIFACT_BUCKET"
            else
              aws s3api create-bucket \
                --bucket "$SAM_ARTIFACT_BUCKET" \
                --create-bucket-configuration LocationConstraint="$AWS_REGION"
            fi
          fi

      - name: Remove failed CloudFormation stack shell
        run: |
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || true)
          if [ "$STACK_STATUS" = "ROLLBACK_COMPLETE" ]; then
            aws cloudformation delete-stack \
              --stack-name "$STACK_NAME" \
              --region "$AWS_REGION"
            aws cloudformation wait stack-delete-complete \
              --stack-name "$STACK_NAME" \
              --region "$AWS_REGION"
          fi

      - name: SAM deploy
        run: >
          sam deploy
          --stack-name "$STACK_NAME"
          --region "$AWS_REGION"
          --capabilities CAPABILITY_IAM
          --s3-bucket "$SAM_ARTIFACT_BUCKET"
          --no-confirm-changeset
          --no-fail-on-empty-changeset
          --parameter-overrides
          ProjectName=${{ vars.PROJECT_NAME || 'github-profile-sam-dev' }}
          DatabaseUrl=${{ secrets.DATABASE_URL }}
          JwtSecret=${{ secrets.JWT_SECRET }}
          CorsOrigin=${{ vars.CORS_ORIGIN }}
          VpcId=${{ vars.VPC_ID }}
          PrivateSubnetIds=${{ vars.PRIVATE_SUBNET_IDS }}
          AuroraSecurityGroupId=${{ vars.AURORA_SECURITY_GROUP_ID }}

      - name: Run database setup inside VPC
        run: |
          SETUP_FUNCTION=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='SetupFunctionName'].OutputValue" \
            --output text)
          INVOKE_ERROR=$(aws lambda invoke \
            --function-name "$SETUP_FUNCTION" \
            --region "$AWS_REGION" \
            --cli-binary-format raw-in-base64-out \
            --payload '{}' \
            --query FunctionError \
            --output text \
            setup-output.json)
          cat setup-output.json
          if [ "$INVOKE_ERROR" != "None" ]; then
            exit 1
          fi

      - name: Upload web assets
        run: |
          WEB_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='WebBucketName'].OutputValue" \
            --output text)
          aws s3 sync apps/web/dist "s3://$WEB_BUCKET" --delete
